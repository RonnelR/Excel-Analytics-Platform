<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Excel Analytics</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #1d3557, #457b9d, #a8dadc);
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
      <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
        Create Account - <span class="text-blue-600">Excel Analytics</span>
      </h2>

      <form class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-700"
            >Full Name</label
          >
          <input
            type="text"
            id="name"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="John Doe"
            required
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700"
            >Email</label
          >
          <input
            type="email"
            id="email"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="you@example.com"
            required
          />
        </div>

        <div>
          <label
            for="password"
            class="block text-sm font-semibold text-gray-700"
            >Password</label
          >
          <input
            type="password"
            id="password"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="••••••••"
            required
          />
        </div>

        <div>
          <label
            for="confirm-password"
            class="block text-sm font-semibold text-gray-700"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirm-password"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="••••••••"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-300"
        >
          Register
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-600">
        Already have an account?
        <a href="login.html" class="text-blue-500 font-medium hover:underline"
          >Sign In</a
        >
      </p>
    </div>
  </body>
</html>
